name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  release-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false
      - name: Install locked runtime dependency
        run: npm ci --omit=optional --ignore-scripts
      - name: Run offline release checks
        run: node scripts/check-release.js
      - name: Scan complete Git history for credentials
        run: node scripts/check-git-history.js
