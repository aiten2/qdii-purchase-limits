name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  release-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false
      - name: Install locked runtime dependency
        run: npm ci --omit=optional --ignore-scripts
      - name: Run offline release checks
        run: node scripts/check-release.js
      - name: Scan complete Git history for credentials
        run: node scripts/check-git-history.js
