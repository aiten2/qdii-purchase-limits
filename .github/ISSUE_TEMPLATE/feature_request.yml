name: 功能建议
description: 建议新的查询范围、来源、输出或兼容方式
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请说明用户场景，而不只是描述一种实现。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: 数据来源与合规考虑
      description: 涉及新来源时，请提供公开链接、访问条件和数据范围。
  - type: checkboxes
    id: boundaries
    attributes:
      label: 边界确认
      options:
        - label: 该建议不要求提交第三方数据集、账号凭据或绕过访问控制。
          required: true
        - label: 该建议不会把项目变成投资推荐或交易信号工具。
          required: true
